{% extends "base.html" %}

{% block content %}
<article class="blog-post-container">
    <header class="blog-post-header" style="margin-bottom: 3rem;">
        <time class="skill-tag" style="display: inline-block; margin-bottom: 1rem;">
            {{ Post.date | date(format="%Y-%m-%d") }}
        </time>

        <h1 class="blog-title" style="margin-bottom: 1rem;">{{ Post.title }}</h1>

        <div class="post-meta" style="display: flex; gap: 1rem; align-items: center;">
            <span class="skill-tag" style="background: transparent; border: 1px solid var(--border-color);">
                {{ Post.category }}
            </span>
            <span class="skill-tag post-status-{{ Post.status }}">
                {{ Post.status }}
            </span>
        </div>
    </header>

    <section class="about-content-dark">
        {{ Post.content | safe }}
    </section>

    <footer style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
        <a href="/blog" class="company-name" style="font-size: 0.9rem;">← back to blog</a>
    </footer>
</article>
{% endblock content %}
